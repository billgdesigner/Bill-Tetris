<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#0b1020">
<title>TETRIS DA CHINHA</title>
<style>
:root{--bg:#070b16;--panel:#121a30;--panel2:#1b2850;--text:#f8fbff;--muted:#98a8c7;--cyan:#4de4ff;--violet:#8f6cff;--pink:#ff5c91;--gold:#ffd166;--safeT:env(safe-area-inset-top,0px);--safeB:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:radial-gradient(circle at 20% 0,#182b5a 0,transparent 38%),radial-gradient(circle at 100% 30%,#3a1558 0,transparent 38%),var(--bg);color:var(--text);font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;touch-action:none}
body{padding:calc(6px + var(--safeT)) 7px calc(7px + var(--safeB))}
button{font:inherit;color:inherit;border:0;cursor:pointer;user-select:none}
.app{width:min(100%,620px);height:calc(100dvh - var(--safeT) - var(--safeB) - 13px);margin:auto;display:grid;grid-template-rows:auto auto minmax(0,1fr) auto;gap:6px}
.header{display:flex;align-items:center;justify-content:space-between;gap:8px}
.brand{min-width:0}.brand h1{margin:0;font-size:clamp(18px,5vw,30px);letter-spacing:.06em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-shadow:0 0 24px #4de4ff55}.brand small{display:block;margin-top:3px;color:var(--muted);font-size:9px;letter-spacing:.12em;text-transform:uppercase}
.header-actions{display:flex;gap:5px}.chip-btn{min-height:39px;padding:0 10px;border-radius:13px;background:linear-gradient(180deg,#22345f,#10182d);box-shadow:inset 0 1px 0 #ffffff18,0 7px 16px #0007;font-size:11px;font-weight:900;border:1px solid #ffffff14;transition:.12s}.chip-btn:active{transform:scale(.94);filter:brightness(.88)}
.hud{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:4px}.hud-card{min-width:0;min-height:64px;padding:6px 3px;border-radius:14px;background:linear-gradient(180deg,#1b2a50,#0d1528);border:1px solid #ffffff12;box-shadow:inset 0 1px 0 #ffffff0d,0 8px 18px #0004;text-align:center;overflow:hidden}.hud-label{font-size:7px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.hud-value{margin-top:7px;font-size:clamp(14px,4vw,20px);font-weight:950;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.preview{display:block;width:48px;height:38px;margin:3px auto 0;border-radius:8px;background:#080d18}.hold-card{position:relative}.hold-card::after{content:"SEGURAR";position:absolute;right:4px;bottom:3px;font-size:6px;color:var(--cyan);font-weight:900}
.board-wrap{position:relative;min-height:0;display:flex;align-items:center;justify-content:center;border-radius:20px;padding:6px;background:linear-gradient(180deg,#0d1730cc,#070c18ee);border:1px solid #ffffff15;box-shadow:0 20px 45px #0007,inset 0 1px 0 #ffffff0a;overflow:hidden}
#game{display:block;max-width:100%;max-height:100%;background:#050913;border-radius:13px;box-shadow:0 18px 36px #0009,0 0 30px #4de4ff10;image-rendering:pixelated}
.controls{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}.ctrl{height:54px;border-radius:16px;font-size:20px;font-weight:950;background:linear-gradient(180deg,#21345e,#111a31);border:1px solid #ffffff16;box-shadow:inset 0 1px 0 #ffffff18,0 8px 18px #0006;transition:.1s}.ctrl:active{transform:translateY(2px) scale(.97);filter:brightness(.85)}.wide{grid-column:span 2;background:linear-gradient(180deg,#2878ff,#194db7)}.drop{background:linear-gradient(180deg,#ff6d9c,#d23b68)}
.overlay,.start-screen{position:absolute;inset:6px;z-index:10;display:none;align-items:center;justify-content:center;text-align:center;padding:20px;border-radius:15px;background:#040814e8;backdrop-filter:blur(10px)}.overlay.show,.start-screen.show{display:flex}
.start-screen{z-index:20;background:radial-gradient(circle at 50% 28%,#2f54a9 0,transparent 35%),radial-gradient(circle at 78% 72%,#5d1b70 0,transparent 35%),linear-gradient(180deg,#101934ee,#040814f5)}
.start-card{width:min(100%,420px)}.logo-orbit{width:150px;height:150px;margin:0 auto 20px;position:relative;animation:float 3s ease-in-out infinite}.ring{position:absolute;inset:0;border:2px solid #4de4ff88;border-radius:50%;box-shadow:0 0 35px #4de4ff33}.ring.r2{inset:18px;border-color:#8f6cffaa;transform:rotate(45deg)}.core{position:absolute;inset:36px;border-radius:24px;background:linear-gradient(135deg,#4de4ff,#8f6cff 58%,#ff5c91);display:grid;place-items:center;box-shadow:0 20px 35px #0006,0 0 32px #8f6cff55}.mini-grid{display:grid;grid-template-columns:repeat(3,18px);gap:4px;transform:rotate(-8deg)}.mini-grid i{width:18px;height:18px;border-radius:4px;background:#fff;box-shadow:inset 0 -4px 6px #6670b955}.start-card h2{margin:0;font-size:clamp(30px,8vw,46px);letter-spacing:.05em}.start-card p{margin:10px auto 20px;max-width:320px;color:#bfcae2;line-height:1.5;font-size:14px}.primary{min-width:190px;min-height:48px;border-radius:15px;background:linear-gradient(180deg,#9d7cff,#6544e8);font-size:17px;font-weight:950;box-shadow:0 12px 30px #4c32b866,inset 0 1px 0 #ffffff35;transition:.12s}.primary:active{transform:scale(.96);filter:brightness(.9)}
.overlay h2{margin:0 0 8px;font-size:28px}.overlay p{margin:0 0 15px;color:var(--muted)}
.phase{position:absolute;inset:0;z-index:9;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0}.phase.show{animation:phase 1.4s ease}.phase span{padding:12px 22px;border-radius:18px;background:#0b1326ee;border:1px solid #ffd16655;color:var(--gold);font-size:24px;font-weight:950;box-shadow:0 0 35px #ffd16622}
@keyframes float{50%{transform:translateY(-9px) rotate(2deg)}}@keyframes phase{0%{opacity:0;transform:scale(.7)}20%,65%{opacity:1;transform:scale(1.05)}100%{opacity:0;transform:scale(1.18)}}
@media(max-height:710px){.app{gap:4px}.brand small{display:none}.hud-card{min-height:56px;padding:4px 2px}.preview{width:40px;height:31px}.hud-value{margin-top:5px}.ctrl{height:46px}.chip-btn{min-height:34px;padding:0 7px}.logo-orbit{width:120px;height:120px}.core{inset:30px}}
@media(max-width:370px){body{padding-left:4px;padding-right:4px}.hud{gap:2px}.hud-card{border-radius:11px}.chip-btn{font-size:9px;padding:0 6px}.ctrl{height:49px}}
</style>
</head>
<body>
<main class="app">
  <header class="header">
    <div class="brand"><h1>TETRIS DA CHINHA</h1><small>edição celta mobile</small></div>
    <div class="header-actions">
      <button id="muteBtn" class="chip-btn" type="button">🔊 Mudo: Off</button>
      <button id="pauseBtn" class="chip-btn" type="button">⏸ Pausa</button>
    </div>
  </header>

  <section class="hud">
    <div class="hud-card"><div class="hud-label">Pontuação</div><div id="score" class="hud-value">0</div></div>
    <div class="hud-card"><div class="hud-label">Linhas</div><div id="lines" class="hud-value">0</div></div>
    <div class="hud-card"><div class="hud-label">Fase</div><div id="level" class="hud-value">1</div></div>
    <div class="hud-card"><div class="hud-label">Próxima</div><canvas id="next" class="preview" width="96" height="76"></canvas></div>
    <button id="holdCard" class="hud-card hold-card" type="button"><div class="hud-label">Reserva</div><canvas id="hold" class="preview" width="96" height="76"></canvas></button>
  </section>

  <section class="board-wrap">
    <canvas id="game" width="300" height="600"></canvas>
    <div id="phase" class="phase"><span id="phaseText">FASE 2</span></div>
    <div id="overlay" class="overlay"><div><h2 id="overlayTitle">Pausa</h2><p id="overlayText">O jogo está pausado.</p><button id="overlayBtn" class="primary" type="button">Continuar</button></div></div>
    <div id="startScreen" class="start-screen show">
      <div class="start-card">
        <div class="logo-orbit"><div class="ring"></div><div class="ring r2"></div><div class="core"><div class="mini-grid"><i></i><i></i><i></i><i></i><i></i><i></i></div></div></div>
        <h2>TETRIS DA CHINHA</h2>
        <p>Um Tetris colorido com ambiente celta, efeitos suaves e controles pensados para celular.</p>
        <button id="startBtn" class="primary" type="button">Começar</button>
      </div>
    </div>
  </section>

  <section class="controls">
    <button class="ctrl" data-action="left" type="button">◀</button>
    <button class="ctrl" data-action="rotate" type="button">↻</button>
    <button class="ctrl" data-action="right" type="button">▶</button>
    <button class="ctrl wide" data-action="down" type="button">▼ Descer</button>
    <button class="ctrl drop" data-action="drop" type="button">⇩</button>
  </section>
</main>
<script>
(() => {
'use strict';
const COLS=10,ROWS=20,BLOCK=30;
const game=document.getElementById('game'),ctx=game.getContext('2d');
const nextCanvas=document.getElementById('next'),nextCtx=nextCanvas.getContext('2d');
const holdCanvas=document.getElementById('hold'),holdCtx=holdCanvas.getContext('2d');
const scoreEl=document.getElementById('score'),linesEl=document.getElementById('lines'),levelEl=document.getElementById('level');
const startScreen=document.getElementById('startScreen'),startBtn=document.getElementById('startBtn');
const pauseBtn=document.getElementById('pauseBtn'),muteBtn=document.getElementById('muteBtn');
const overlay=document.getElementById('overlay'),overlayTitle=document.getElementById('overlayTitle'),overlayText=document.getElementById('overlayText'),overlayBtn=document.getElementById('overlayBtn');
const phase=document.getElementById('phase'),phaseText=document.getElementById('phaseText');
const colors=[null,'#38e8ff','#ffd54a','#ae72ff','#49e29c','#ff5f7a','#4c7dff','#ff9f43'];
const shapes=[[[1,1,1,1]],[[2,2],[2,2]],[[0,3,0],[3,3,3]],[[0,4,4],[4,4,0]],[[5,5,0],[0,5,5]],[[6,0,0],[6,6,6]],[[0,0,7],[7,7,7]]];
let board=[],player=null,nextPiece=null,holdPieceData=null,canHold=true,score=0,lines=0,level=1,paused=true,gameOver=false,started=false,lastTime=0,dropCounter=0;
let audioCtx=null,masterGain=null,musicTimer=null,muted=false,musicStep=0;
const clone=m=>m.map(r=>[...r]);
const emptyBoard=()=>Array.from({length:ROWS},()=>Array(COLS).fill(0));
const randomPiece=()=>({matrix:clone(shapes[Math.floor(Math.random()*shapes.length)]),x:0,y:0});
function collide(arena,p){for(let y=0;y<p.matrix.length;y++){for(let x=0;x<p.matrix[y].length;x++){if(p.matrix[y][x]!==0&&(arena[y+p.y]&&arena[y+p.y][x+p.x])!==0)return true}}return false}
function spawn(piece=null){player=piece||nextPiece||randomPiece();if(!piece)nextPiece=randomPiece();player.x=Math.floor(COLS/2)-Math.ceil(player.matrix[0].length/2);player.y=0;canHold=true;if(collide(board,player)){gameOver=true;paused=true;showOverlay('Fim de jogo','Pontuação: '+score.toLocaleString('pt-BR'),'Jogar novamente')}drawPreviews()}
function merge(){player.matrix.forEach((row,y)=>row.forEach((v,x)=>{if(v)board[y+player.y][x+player.x]=v}))}
function rotateMatrix(m){return m[0].map((_,i)=>m.map(r=>r[i]).reverse())}
function move(dir){if(paused||gameOver)return;player.x+=dir;if(collide(board,player))player.x-=dir;draw()}
function rotatePlayer(){if(paused||gameOver)return;const old=player.matrix,oldX=player.x;player.matrix=rotateMatrix(player.matrix);let offset=1;while(collide(board,player)){player.x+=offset;offset=-(offset+(offset>0?1:-1));if(Math.abs(offset)>player.matrix[0].length){player.matrix=old;player.x=oldX;return}}draw()}
function drop(manual=false){if(paused||gameOver)return;player.y++;if(collide(board,player)){player.y--;merge();clearLines();spawn()}else if(manual){score++;updateStats()}dropCounter=0;draw()}
function hardDrop(){if(paused||gameOver)return;let distance=0;while(!collide(board,player)){player.y++;distance++}player.y--;distance--;if(distance>0)score+=distance*2;merge();clearLines();spawn();updateStats();draw()}
function holdCurrent(){if(paused||gameOver||!canHold)return;const current={matrix:clone(player.matrix),x:0,y:0};if(!holdPieceData){holdPieceData=current;spawn()}else{const swap=holdPieceData;holdPieceData=current;spawn(swap)}canHold=false;drawPreviews()}
function clearLines(){let cleared=0;outer:for(let y=ROWS-1;y>=0;y--){for(let x=0;x<COLS;x++)if(board[y][x]===0)continue outer;board.splice(y,1);board.unshift(Array(COLS).fill(0));y++;cleared++}if(cleared){const oldLevel=level;score+=([0,100,300,500,800][cleared]||cleared*250)*level;lines+=cleared;level=Math.floor(lines/10)+1;updateStats();if(level>oldLevel){phaseText.textContent='FASE '+level;phase.classList.remove('show');void phase.offsetWidth;phase.classList.add('show');playLevelSound()}}}
function drawCell(c,x,y,v,size=BLOCK){if(!v)return;const px=x*size,py=y*size;c.fillStyle=colors[v];c.fillRect(px+1,py+1,size-2,size-2);const g=c.createLinearGradient(px,py,px,py+size);g.addColorStop(0,'rgba(255,255,255,.34)');g.addColorStop(.55,'rgba(255,255,255,.05)');g.addColorStop(1,'rgba(0,0,0,.28)');c.fillStyle=g;c.fillRect(px+2,py+2,size-4,size-4)}
function drawMatrix(m,o,c=ctx,size=BLOCK){m.forEach((row,y)=>row.forEach((v,x)=>drawCell(c,x+o.x,y+o.y,v,size)))}
function drawGrid(){ctx.strokeStyle='rgba(255,255,255,.045)';for(let x=0;x<=COLS;x++){ctx.beginPath();ctx.moveTo(x*BLOCK+.5,0);ctx.lineTo(x*BLOCK+.5,ROWS*BLOCK);ctx.stroke()}for(let y=0;y<=ROWS;y++){ctx.beginPath();ctx.moveTo(0,y*BLOCK+.5);ctx.lineTo(COLS*BLOCK,y*BLOCK+.5);ctx.stroke()}}
function drawGhost(){const g={matrix:player.matrix,x:player.x,y:player.y};while(!collide(board,g))g.y++;g.y--;ctx.save();ctx.globalAlpha=.18;drawMatrix(g.matrix,g);ctx.restore()}
function draw(){ctx.clearRect(0,0,game.width,game.height);ctx.fillStyle='#050913';ctx.fillRect(0,0,game.width,game.height);drawGrid();drawMatrix(board,{x:0,y:0});if(player&&!gameOver){drawGhost();drawMatrix(player.matrix,player)}}
function drawMini(piece,c,canvas){c.clearRect(0,0,canvas.width,canvas.height);c.fillStyle='#080d18';c.fillRect(0,0,canvas.width,canvas.height);if(!piece)return;const m=piece.matrix,size=Math.floor(Math.min(canvas.width/(m[0].length+1.3),canvas.height/(m.length+1.3)));const ox=Math.floor((canvas.width/size-m[0].length)/2),oy=Math.floor((canvas.height/size-m.length)/2);drawMatrix(m,{x:ox,y:oy},c,size)}
function drawPreviews(){drawMini(nextPiece,nextCtx,nextCanvas);drawMini(holdPieceData,holdCtx,holdCanvas)}
function updateStats(){scoreEl.textContent=score.toLocaleString('pt-BR');linesEl.textContent=lines;levelEl.textContent=level}
function speed(){return Math.max(90,820-(level-1)*70)}
function loop(time=0){const delta=time-lastTime;lastTime=time;if(started&&!paused&&!gameOver){dropCounter+=delta;if(dropCounter>speed())drop()}requestAnimationFrame(loop)}
function showOverlay(title,text,button){overlayTitle.textContent=title;overlayText.textContent=text;overlayBtn.textContent=button;overlay.classList.add('show')}
function hideOverlay(){overlay.classList.remove('show')}
function togglePause(){if(!started||gameOver)return;paused=!paused;pauseBtn.textContent=paused?'▶ Continuar':'⏸ Pausa';if(paused)showOverlay('Pausa','O jogo está pausado.','Continuar');else hideOverlay()}
function resetGame(){board=emptyBoard();score=0;lines=0;level=1;holdPieceData=null;nextPiece=randomPiece();gameOver=false;paused=false;started=true;spawn();updateStats();hideOverlay();pauseBtn.textContent='⏸ Pausa';dropCounter=0;lastTime=performance.now();draw()}
function initAudio(){if(audioCtx)return;audioCtx=new(window.AudioContext||window.webkitAudioContext)();masterGain=audioCtx.createGain();masterGain.gain.value=.45;masterGain.connect(audioCtx.destination)}
function tone(freq,start,dur,vol=.05,type='triangle'){if(!audioCtx||!masterGain)return;const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=type;o.frequency.value=freq;g.gain.setValueAtTime(.0001,start);g.gain.linearRampToValueAtTime(vol,start+.03);g.gain.exponentialRampToValueAtTime(.0001,start+dur);o.connect(g);g.connect(masterGain);o.start(start);o.stop(start+dur+.05)}
function startMusic(){initAudio();if(musicTimer)return;const melody=[293.66,329.63,392,440,523.25,440,392,329.63];const playBar=()=>{const now=audioCtx.currentTime+.05;for(let i=0;i<8;i++)tone(melody[(musicStep+i)%melody.length],now+i*.48,.7,.035,'triangle');musicStep=(musicStep+8)%32};playBar();musicTimer=setInterval(playBar,3840)}
function playLevelSound(){if(!audioCtx||muted)return;const t=audioCtx.currentTime+.03;[392,523.25,659.25,783.99,1046.5].forEach((f,i)=>tone(f,t+i*.42,.85,.11,'triangle'))}
function setMuted(v){muted=v;if(masterGain&&audioCtx)masterGain.gain.setTargetAtTime(v?0:.45,audioCtx.currentTime,.03);muteBtn.textContent=v?'🔇 Mudo: On':'🔊 Mudo: Off'}
function action(name){({left:()=>move(-1),right:()=>move(1),rotate:rotatePlayer,down:()=>drop(true),drop:hardDrop}[name]||(()=>{}))()}
document.querySelectorAll('[data-action]').forEach(btn=>{let timer;const name=btn.dataset.action;const start=e=>{e.preventDefault();action(name);if(['left','right','down'].includes(name))timer=setInterval(()=>action(name),110)};const stop=e=>{e.preventDefault();clearInterval(timer)};btn.addEventListener('pointerdown',start);btn.addEventListener('pointerup',stop);btn.addEventListener('pointercancel',stop);btn.addEventListener('pointerleave',stop)});
document.getElementById('holdCard').addEventListener('click',holdCurrent);
pauseBtn.addEventListener('click',togglePause);
muteBtn.addEventListener('click',()=>setMuted(!muted));
overlayBtn.addEventListener('click',()=>gameOver?resetGame():togglePause());
startBtn.addEventListener('click',async()=>{startScreen.classList.remove('show');resetGame();try{initAudio();if(audioCtx.state==='suspended')await audioCtx.resume();startMusic()}catch(e){console.warn('Audio indisponível',e)}});
let sx=0,sy=0,st=0;game.addEventListener('pointerdown',e=>{sx=e.clientX;sy=e.clientY;st=performance.now()});game.addEventListener('pointerup',e=>{const dx=e.clientX-sx,dy=e.clientY-sy,ax=Math.abs(dx),ay=Math.abs(dy);if(performance.now()-st<260&&ax<18&&ay<18){rotatePlayer();return}if(ax>ay&&ax>24)move(dx>0?1:-1);else if(dy>28){if(dy>110)hardDrop();else drop(true)}});
document.addEventListener('visibilitychange',()=>{if(document.hidden&&started&&!paused&&!gameOver)togglePause()});
function fit(){const wrap=document.querySelector('.board-wrap'),r=wrap.getBoundingClientRect(),ratio=.5;let w=r.width-12,h=r.height-12;if(w/h>ratio)w=h*ratio;else h=w/ratio;game.style.width=Math.floor(w)+'px';game.style.height=Math.floor(h)+'px'}
window.addEventListener('resize',fit);window.addEventListener('orientationchange',()=>setTimeout(fit,120));
board=emptyBoard();nextPiece=randomPiece();spawn();updateStats();draw();fit();loop();
})();
</script>
</body>
</html>
