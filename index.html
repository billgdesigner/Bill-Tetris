<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#07101f">
<title>TETRIS DA CHINHA</title>
<style>
:root{
  --bg:#060b16;
  --panel:#101a31;
  --panel2:#18294b;
  --text:#f7fbff;
  --muted:#91a3c2;
  --cyan:#43e2ff;
  --blue:#2b74ff;
  --pink:#ff5e8a;
  --gold:#ffd463;
  --safeT:env(safe-area-inset-top,0px);
  --safeB:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:
    radial-gradient(circle at 20% 0,rgba(45,91,180,.22),transparent 38%),
    radial-gradient(circle at 100% 30%,rgba(121,45,164,.16),transparent 38%),
    var(--bg);
  color:var(--text);
  font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  touch-action:none;
}
body{padding:calc(5px + var(--safeT)) 6px calc(6px + var(--safeB))}
button{font:inherit;color:inherit;border:0;cursor:pointer;user-select:none}
.app{
  width:min(100%,660px);
  height:calc(100dvh - var(--safeT) - var(--safeB) - 11px);
  margin:auto;
  display:grid;
  grid-template-rows:auto auto minmax(0,1fr) auto;
  gap:5px;
}
.header{display:flex;align-items:center;justify-content:space-between;gap:8px}
.brand{min-width:0}
.brand h1{
  margin:0;
  font-size:clamp(18px,5vw,30px);
  letter-spacing:.055em;
  line-height:1;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  text-shadow:0 0 18px rgba(67,226,255,.22);
}
.header-actions{display:flex;gap:5px}
.small-btn{
  min-height:38px;
  padding:0 10px;
  border-radius:12px;
  background:linear-gradient(180deg,#22345d,#111a30);
  border:1px solid rgba(255,255,255,.08);
  box-shadow:inset 0 1px rgba(255,255,255,.08),0 6px 15px rgba(0,0,0,.3);
  font-size:11px;
  font-weight:900;
}
.small-btn:active,.control:active,.side-control:active,.primary:active{
  transform:scale(.96);
  filter:brightness(.86);
}
.hud{
  display:grid;
  grid-template-columns:repeat(5,minmax(0,1fr));
  gap:4px;
}
.hud-card{
  min-width:0;
  min-height:61px;
  padding:5px 3px;
  border-radius:13px;
  text-align:center;
  background:linear-gradient(180deg,#1a2a4d,#0c1426);
  border:1px solid rgba(255,255,255,.07);
  overflow:hidden;
}
.hud-label{
  font-size:7px;
  letter-spacing:.1em;
  text-transform:uppercase;
  color:var(--muted);
  font-weight:900;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.hud-value{
  margin-top:7px;
  font-size:clamp(14px,4vw,20px);
  font-weight:950;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.preview{
  display:block;
  width:46px;
  height:36px;
  margin:3px auto 0;
  border-radius:7px;
  background:#070c16;
}
.hold-card{position:relative}
.hold-card::after{
  content:"SEGURAR";
  position:absolute;
  right:4px;
  bottom:3px;
  font-size:6px;
  color:var(--cyan);
  font-weight:900;
}
.board-shell{
  position:relative;
  min-height:0;
  display:grid;
  grid-template-columns:clamp(44px,13vw,76px) minmax(0,1fr) clamp(44px,13vw,76px);
  align-items:center;
  gap:5px;
  padding:5px;
  border-radius:19px;
  background:linear-gradient(180deg,rgba(13,23,45,.9),rgba(5,10,20,.96));
  border:1px solid rgba(255,255,255,.08);
  box-shadow:0 18px 40px rgba(0,0,0,.32);
  overflow:hidden;
}
.canvas-wrap{
  min-width:0;
  min-height:0;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
}
#game{
  display:block;
  max-width:100%;
  max-height:100%;
  background:#040812;
  border-radius:12px;
  box-shadow:0 16px 36px rgba(0,0,0,.5),0 0 26px rgba(67,226,255,.04);
  image-rendering:pixelated;
}
.side-control{
  width:100%;
  height:min(30vh,220px);
  min-height:130px;
  border-radius:18px;
  background:linear-gradient(180deg,#18294b,#0d1629);
  border:1px solid rgba(255,255,255,.08);
  box-shadow:inset 0 1px rgba(255,255,255,.07),0 9px 20px rgba(0,0,0,.28);
  font-size:30px;
  font-weight:950;
  display:flex;
  align-items:center;
  justify-content:center;
}
.side-control span{display:block}
.rotate-hint{
  position:absolute;
  left:50%;
  bottom:8px;
  transform:translateX(-50%);
  pointer-events:none;
  padding:5px 9px;
  border-radius:999px;
  color:#b8c8e4;
  background:rgba(4,8,18,.7);
  border:1px solid rgba(255,255,255,.06);
  font-size:8px;
  font-weight:850;
  letter-spacing:.06em;
  text-transform:uppercase;
  white-space:nowrap;
}
.bottom-controls{
  display:grid;
  grid-template-columns:1.35fr 1fr;
  gap:6px;
}
.control{
  height:51px;
  border-radius:15px;
  font-size:15px;
  font-weight:950;
  border:1px solid rgba(255,255,255,.09);
  box-shadow:inset 0 1px rgba(255,255,255,.1),0 7px 17px rgba(0,0,0,.3);
}
.down{background:linear-gradient(180deg,#2777ff,#184bad)}
.drop{background:linear-gradient(180deg,#ff7095,#ce3c64)}
.overlay,.start{
  position:absolute;
  inset:5px;
  z-index:15;
  display:none;
  align-items:center;
  justify-content:center;
  padding:20px;
  text-align:center;
  border-radius:14px;
  background:rgba(3,7,16,.9);
  backdrop-filter:blur(8px);
}
.overlay.show,.start.show{display:flex}
.start-card,.overlay-card{width:min(100%,360px)}
.start h2,.overlay h2{margin:0 0 8px;font-size:clamp(27px,8vw,42px)}
.start p,.overlay p{margin:0 0 16px;color:var(--muted);font-size:13px;line-height:1.45}
.primary{
  min-width:180px;
  min-height:46px;
  padding:0 20px;
  border-radius:14px;
  background:linear-gradient(180deg,#8b72ff,#5e43de);
  box-shadow:0 10px 24px rgba(69,45,171,.35),inset 0 1px rgba(255,255,255,.2);
  font-size:16px;
  font-weight:950;
}
.phase-flash{
  position:absolute;
  inset:0;
  z-index:12;
  pointer-events:none;
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
}
.phase-flash.show{animation:phaseFlash 1.25s ease}
.phase-badge{
  padding:12px 20px;
  border-radius:17px;
  background:rgba(7,13,26,.93);
  border:1px solid rgba(255,212,99,.35);
  color:var(--gold);
  font-size:24px;
  font-weight:950;
}
@keyframes phaseFlash{
  0%{opacity:0;transform:scale(.7)}
  18%,68%{opacity:1;transform:scale(1.05)}
  100%{opacity:0;transform:scale(1.18)}
}
.difficulty{
  position:absolute;
  top:8px;
  left:50%;
  transform:translateX(-50%);
  z-index:4;
  padding:4px 8px;
  border-radius:999px;
  font-size:8px;
  font-weight:900;
  letter-spacing:.08em;
  background:rgba(8,14,27,.78);
  border:1px solid rgba(255,255,255,.06);
  color:#a9bad7;
}
@media(max-height:710px){
  .app{gap:3px}
  .hud-card{min-height:54px;padding:4px 2px}
  .preview{width:39px;height:30px}
  .hud-value{margin-top:5px}
  .small-btn{min-height:34px;padding:0 7px}
  .control{height:45px}
  .side-control{min-height:110px;height:min(28vh,180px)}
}
@media(max-width:370px){
  body{padding-left:3px;padding-right:3px}
  .hud{gap:2px}
  .hud-card{border-radius:10px}
  .small-btn{font-size:9px;padding:0 6px}
  .board-shell{grid-template-columns:42px minmax(0,1fr) 42px;gap:3px;padding:3px}
  .side-control{border-radius:13px;font-size:24px}
  .rotate-hint{font-size:7px;padding:4px 7px}
}
</style>
</head>
<body>
<main class="app">
  <header class="header">
    <div class="brand"><h1>TETRIS DA CHINHA</h1></div>
    <div class="header-actions">
      <button id="muteBtn" class="small-btn" type="button">🔊 Mudo: Off</button>
      <button id="pauseBtn" class="small-btn" type="button">⏸ Pausa</button>
    </div>
  </header>

  <section class="hud">
    <div class="hud-card"><div class="hud-label">Pontuação</div><div id="score" class="hud-value">0</div></div>
    <div class="hud-card"><div class="hud-label">Linhas</div><div id="lines" class="hud-value">0</div></div>
    <div class="hud-card"><div class="hud-label">Fase</div><div id="level" class="hud-value">1</div></div>
    <div class="hud-card"><div class="hud-label">Próxima</div><canvas id="next" class="preview" width="92" height="72"></canvas></div>
    <button id="holdBtn" class="hud-card hold-card" type="button"><div class="hud-label">Reserva</div><canvas id="hold" class="preview" width="92" height="72"></canvas></button>
  </section>

  <section class="board-shell">
    <button class="side-control" data-action="left" type="button" aria-label="Mover para a esquerda"><span>◀</span></button>

    <div class="canvas-wrap">
      <canvas id="game" width="300" height="600"></canvas>
    </div>

    <button class="side-control" data-action="right" type="button" aria-label="Mover para a direita"><span>▶</span></button>

    <div id="difficulty" class="difficulty">FÁCIL</div>
    <div class="rotate-hint">Toque no tabuleiro para girar</div>

    <div id="phaseFlash" class="phase-flash"><div id="phaseBadge" class="phase-badge">FASE 2</div></div>

    <div id="overlay" class="overlay">
      <div class="overlay-card">
        <h2 id="overlayTitle">Pausa</h2>
        <p id="overlayText">O jogo está pausado.</p>
        <button id="overlayBtn" class="primary" type="button">Continuar</button>
      </div>
    </div>

    <div id="startScreen" class="start show">
      <div class="start-card">
        <h2>TETRIS DA CHINHA</h2>
        <p>150 fases. Toque no tabuleiro para girar as peças.</p>
        <button id="startBtn" class="primary" type="button">Começar</button>
      </div>
    </div>
  </section>

  <section class="bottom-controls">
    <button class="control down" data-action="down" type="button">▼ Descer</button>
    <button class="control drop" data-action="drop" type="button">⇩ Queda</button>
  </section>
</main>

<script>
(() => {
'use strict';

const COLS=10, ROWS=20, BLOCK=30, LINES_PER_PHASE=2, MAX_PHASE=150;
const game=document.getElementById('game'), ctx=game.getContext('2d');
const nextCanvas=document.getElementById('next'), nextCtx=nextCanvas.getContext('2d');
const holdCanvas=document.getElementById('hold'), holdCtx=holdCanvas.getContext('2d');

const scoreEl=document.getElementById('score');
const linesEl=document.getElementById('lines');
const levelEl=document.getElementById('level');
const difficultyEl=document.getElementById('difficulty');
const startScreen=document.getElementById('startScreen');
const overlay=document.getElementById('overlay');
const overlayTitle=document.getElementById('overlayTitle');
const overlayText=document.getElementById('overlayText');
const overlayBtn=document.getElementById('overlayBtn');
const pauseBtn=document.getElementById('pauseBtn');
const muteBtn=document.getElementById('muteBtn');
const phaseFlash=document.getElementById('phaseFlash');
const phaseBadge=document.getElementById('phaseBadge');

const COLORS=[null,'#39e6ff','#ffd74f','#ab70ff','#49e29d','#ff6380','#527dff','#ff9f45'];
const SHAPES=[
  [[1,1,1,1]],
  [[2,2],[2,2]],
  [[0,3,0],[3,3,3]],
  [[0,4,4],[4,4,0]],
  [[5,5,0],[0,5,5]],
  [[6,0,0],[6,6,6]],
  [[0,0,7],[7,7,7]]
];

let board,player,nextPiece,heldPiece=null,canHold=true;
let score=0,lines=0,level=1,lastTime=0,dropCounter=0;
let paused=true,gameOver=false,started=false,won=false;
let audioCtx=null,masterGain=null,muted=false;

const emptyBoard=()=>Array.from({length:ROWS},()=>Array(COLS).fill(0));
const clone=m=>m.map(r=>[...r]);
const randomPiece=()=>({matrix:clone(SHAPES[Math.floor(Math.random()*SHAPES.length)]),x:0,y:0});

function initAudio(){
  if(audioCtx)return;
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  masterGain=audioCtx.createGain();
  masterGain.gain.value=.45;
  masterGain.connect(audioCtx.destination);
}
function tone(freq,duration=.06,volume=.055,type='square',delay=0){
  if(!audioCtx||muted)return;
  const t=audioCtx.currentTime+delay;
  const osc=audioCtx.createOscillator();
  const gain=audioCtx.createGain();
  osc.type=type;
  osc.frequency.value=freq;
  gain.gain.setValueAtTime(.0001,t);
  gain.gain.linearRampToValueAtTime(volume,t+.008);
  gain.gain.exponentialRampToValueAtTime(.0001,t+duration);
  osc.connect(gain);
  gain.connect(masterGain);
  osc.start(t);
  osc.stop(t+duration+.02);
}
function sfxMove(){tone(260,.035,.025,'square')}
function sfxLand(){tone(110,.08,.06,'triangle');tone(80,.1,.04,'sine',.025)}
function sfxLine(){
  [440,554,659].forEach((f,i)=>tone(f,.12,.065,'triangle',i*.055));
}
function sfxPhase(){
  [392,523,659,784,1047].forEach((f,i)=>tone(f,.22,.075,'triangle',i*.12));
}
function sfxLose(){
  [330,294,247,196,147].forEach((f,i)=>tone(f,.32,.07,'sawtooth',i*.16));
}
function sfxWin(){
  [523,659,784,1047,1319].forEach((f,i)=>tone(f,.35,.085,'triangle',i*.13));
}

function collide(arena,p){
  for(let y=0;y<p.matrix.length;y++){
    for(let x=0;x<p.matrix[y].length;x++){
      if(p.matrix[y][x]!==0 && (arena[y+p.y] && arena[y+p.y][x+p.x])!==0)return true;
    }
  }
  return false;
}
function spawn(piece=null){
  player=piece||nextPiece||randomPiece();
  if(!piece)nextPiece=randomPiece();
  player.x=Math.floor(COLS/2)-Math.ceil(player.matrix[0].length/2);
  player.y=0;
  canHold=true;
  if(collide(board,player)){
    gameOver=true;
    paused=true;
    sfxLose();
    showOverlay('Fim de jogo','Pontuação: '+score.toLocaleString('pt-BR'),'Jogar novamente');
  }
  drawPreviews();
}
function merge(){
  player.matrix.forEach((row,y)=>row.forEach((v,x)=>{
    if(v)board[y+player.y][x+player.x]=v;
  }));
}
function rotateMatrix(m){return m[0].map((_,i)=>m.map(r=>r[i]).reverse())}
function move(dir){
  if(paused||gameOver||won)return;
  player.x+=dir;
  if(collide(board,player))player.x-=dir;
  else sfxMove();
  draw();
}
function rotatePlayer(){
  if(paused||gameOver||won)return;
  const old=player.matrix,oldX=player.x;
  player.matrix=rotateMatrix(player.matrix);
  let offset=1;
  while(collide(board,player)){
    player.x+=offset;
    offset=-(offset+(offset>0?1:-1));
    if(Math.abs(offset)>player.matrix[0].length){
      player.matrix=old;
      player.x=oldX;
      return;
    }
  }
  tone(360,.05,.03,'triangle');
  draw();
}
function drop(manual=false){
  if(paused||gameOver||won)return;
  player.y++;
  if(collide(board,player)){
    player.y--;
    merge();
    sfxLand();
    clearLines();
    if(!won)spawn();
  }else if(manual){
    score++;
    updateStats();
  }
  dropCounter=0;
  draw();
}
function hardDrop(){
  if(paused||gameOver||won)return;
  let distance=0;
  while(!collide(board,player)){player.y++;distance++}
  player.y--;
  distance--;
  if(distance>0)score+=distance*2;
  merge();
  sfxLand();
  clearLines();
  if(!won)spawn();
  updateStats();
  draw();
}
function holdCurrent(){
  if(paused||gameOver||won||!canHold)return;
  const current={matrix:clone(player.matrix),x:0,y:0};
  if(!heldPiece){
    heldPiece=current;
    spawn();
  }else{
    const swap=heldPiece;
    heldPiece=current;
    spawn(swap);
  }
  canHold=false;
  drawPreviews();
  tone(310,.07,.035,'triangle');
}
function clearLines(){
  let cleared=0;
  outer:
  for(let y=ROWS-1;y>=0;y--){
    for(let x=0;x<COLS;x++)if(board[y][x]===0)continue outer;
    board.splice(y,1);
    board.unshift(Array(COLS).fill(0));
    y++;
    cleared++;
  }
  if(!cleared)return;

  sfxLine();
  score+=([0,100,300,500,800][cleared]||cleared*250)*level;
  lines+=cleared;

  const oldLevel=level;
  const computed=Math.floor(lines/LINES_PER_PHASE)+1;

  if(computed>MAX_PHASE){
    level=MAX_PHASE;
    updateStats();
    winGame();
    return;
  }

  level=computed;
  updateStats();

  if(level>oldLevel){
    phaseBadge.textContent='FASE '+level;
    phaseFlash.classList.remove('show');
    void phaseFlash.offsetWidth;
    phaseFlash.classList.add('show');
    sfxPhase();
  }
}
function winGame(){
  won=true;
  paused=true;
  sfxWin();
  showOverlay('PARABÉNS\nVOCÊ GANHOU','Você concluiu as 150 fases.','Jogar novamente');
}
function difficultyName(){
  if(level<=49)return 'FÁCIL';
  if(level<=99)return 'NORMAL';
  return 'DIFÍCIL';
}
function speed(){
  if(level<=49){
    const p=(level-1)/48;
    return Math.round(1100-(p*430));
  }
  if(level<=99){
    const p=(level-50)/49;
    return Math.round(620-(p*300));
  }
  const p=(level-100)/50;
  return Math.round(290-(p*210));
}
function drawCell(c,x,y,v,size=BLOCK){
  if(!v)return;
  const px=x*size,py=y*size;
  c.fillStyle=COLORS[v];
  c.fillRect(px+1,py+1,size-2,size-2);
  const g=c.createLinearGradient(px,py,px,py+size);
  g.addColorStop(0,'rgba(255,255,255,.34)');
  g.addColorStop(.55,'rgba(255,255,255,.05)');
  g.addColorStop(1,'rgba(0,0,0,.28)');
  c.fillStyle=g;
  c.fillRect(px+2,py+2,size-4,size-4);
}
function drawMatrix(m,o,c=ctx,size=BLOCK){
  m.forEach((row,y)=>row.forEach((v,x)=>drawCell(c,x+o.x,y+o.y,v,size)));
}
function drawGrid(){
  ctx.strokeStyle='rgba(255,255,255,.045)';
  for(let x=0;x<=COLS;x++){
    ctx.beginPath();ctx.moveTo(x*BLOCK+.5,0);ctx.lineTo(x*BLOCK+.5,ROWS*BLOCK);ctx.stroke();
  }
  for(let y=0;y<=ROWS;y++){
    ctx.beginPath();ctx.moveTo(0,y*BLOCK+.5);ctx.lineTo(COLS*BLOCK,y*BLOCK+.5);ctx.stroke();
  }
}
function drawGhost(){
  const ghost={matrix:player.matrix,x:player.x,y:player.y};
  while(!collide(board,ghost))ghost.y++;
  ghost.y--;
  ctx.save();
  ctx.globalAlpha=.17;
  drawMatrix(ghost.matrix,ghost);
  ctx.restore();
}
function draw(){
  ctx.clearRect(0,0,game.width,game.height);
  ctx.fillStyle='#040812';
  ctx.fillRect(0,0,game.width,game.height);
  drawGrid();
  drawMatrix(board,{x:0,y:0});
  if(player&&!gameOver&&!won){
    drawGhost();
    drawMatrix(player.matrix,player);
  }
}
function drawMini(piece,c,canvas){
  c.clearRect(0,0,canvas.width,canvas.height);
  c.fillStyle='#070c16';
  c.fillRect(0,0,canvas.width,canvas.height);
  if(!piece)return;
  const m=piece.matrix;
  const size=Math.floor(Math.min(canvas.width/(m[0].length+1.3),canvas.height/(m.length+1.3)));
  const ox=Math.floor((canvas.width/size-m[0].length)/2);
  const oy=Math.floor((canvas.height/size-m.length)/2);
  drawMatrix(m,{x:ox,y:oy},c,size);
}
function drawPreviews(){
  drawMini(nextPiece,nextCtx,nextCanvas);
  drawMini(heldPiece,holdCtx,holdCanvas);
}
function updateStats(){
  scoreEl.textContent=score.toLocaleString('pt-BR');
  linesEl.textContent=lines;
  levelEl.textContent=level;
  difficultyEl.textContent=difficultyName();
}
function loop(time=0){
  const delta=time-lastTime;
  lastTime=time;
  if(started&&!paused&&!gameOver&&!won){
    dropCounter+=delta;
    if(dropCounter>speed())drop();
  }
  requestAnimationFrame(loop);
}
function showOverlay(title,text,button){
  overlayTitle.innerHTML=title.replace('\n','<br>');
  overlayText.textContent=text;
  overlayBtn.textContent=button;
  overlay.classList.add('show');
}
function hideOverlay(){overlay.classList.remove('show')}
function togglePause(){
  if(!started||gameOver||won)return;
  paused=!paused;
  pauseBtn.textContent=paused?'▶ Continuar':'⏸ Pausa';
  if(paused)showOverlay('Pausa','O jogo está pausado.','Continuar');
  else hideOverlay();
}
function resetGame(){
  board=emptyBoard();
  score=0;lines=0;level=1;
  heldPiece=null;
  nextPiece=randomPiece();
  paused=false;gameOver=false;won=false;started=true;
  spawn();
  updateStats();
  hideOverlay();
  pauseBtn.textContent='⏸ Pausa';
  dropCounter=0;
  lastTime=performance.now();
  draw();
}
function setMuted(value){
  muted=value;
  muteBtn.textContent=muted?'🔇 Mudo: On':'🔊 Mudo: Off';
}

function action(name){
  const actions={
    left:()=>move(-1),
    right:()=>move(1),
    down:()=>drop(true),
    drop:hardDrop
  };
  actions[name]?.();
}

document.querySelectorAll('[data-action]').forEach(btn=>{
  let timer;
  const name=btn.dataset.action;
  const start=e=>{
    e.preventDefault();
    action(name);
    if(['left','right','down'].includes(name))timer=setInterval(()=>action(name),115);
  };
  const stop=e=>{
    e.preventDefault();
    clearInterval(timer);
  };
  btn.addEventListener('pointerdown',start);
  btn.addEventListener('pointerup',stop);
  btn.addEventListener('pointercancel',stop);
  btn.addEventListener('pointerleave',stop);
});

document.getElementById('holdBtn').addEventListener('click',holdCurrent);
pauseBtn.addEventListener('click',togglePause);
muteBtn.addEventListener('click',()=>setMuted(!muted));
overlayBtn.addEventListener('click',()=>resetGame());
document.getElementById('startBtn').addEventListener('click',async()=>{
  startScreen.classList.remove('show');
  resetGame();
  try{
    initAudio();
    if(audioCtx.state==='suspended')await audioCtx.resume();
  }catch(e){
    console.warn('Áudio indisponível',e);
  }
});

let sx=0,sy=0,st=0;
game.addEventListener('pointerdown',e=>{
  sx=e.clientX;sy=e.clientY;st=performance.now();
});
game.addEventListener('pointerup',e=>{
  const dx=e.clientX-sx,dy=e.clientY-sy;
  const ax=Math.abs(dx),ay=Math.abs(dy);
  if(performance.now()-st<260&&ax<18&&ay<18){
    rotatePlayer();
    return;
  }
  if(ax>ay&&ax>24)move(dx>0?1:-1);
  else if(dy>28){
    if(dy>110)hardDrop();
    else drop(true);
  }
});

document.addEventListener('visibilitychange',()=>{
  if(document.hidden&&started&&!paused&&!gameOver&&!won)togglePause();
});

function fit(){
  const wrap=document.querySelector('.canvas-wrap');
  const r=wrap.getBoundingClientRect();
  const ratio=.5;
  let w=r.width-4,h=r.height-4;
  if(w/h>ratio)w=h*ratio;
  else h=w/ratio;
  game.style.width=Math.floor(w)+'px';
  game.style.height=Math.floor(h)+'px';
}
window.addEventListener('resize',fit);
window.addEventListener('orientationchange',()=>setTimeout(fit,120));

board=emptyBoard();
nextPiece=randomPiece();
spawn();
updateStats();
draw();
fit();
loop();
})();
</script>
</body>
</html>
